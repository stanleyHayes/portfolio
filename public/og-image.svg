<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#F5A623"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.08" stroke="#60A5FA" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>
  <!-- Orbs -->
  <circle cx="200" cy="150" r="120" fill="#60A5FA" opacity="0.06"/>
  <circle cx="1000" cy="480" r="150" fill="#F5A623" opacity="0.05"/>
  <!-- Accent line -->
  <rect x="80" y="280" width="80" height="4" rx="2" fill="url(#accent)"/>
  <!-- Zeus bolt -->
  <text x="1060" y="140" font-family="serif" font-size="80" fill="#F5A623" opacity="0.15">&#x26A1;</text>
  <!-- Name -->
  <text x="80" y="250" font-family="Google Sans, Inter, sans-serif" font-size="56" font-weight="700" fill="#F9FAFB">Stanley Asoku Hayford</text>
  <!-- Title -->
  <text x="80" y="340" font-family="Google Sans, Inter, sans-serif" font-size="32" fill="#60A5FA">Software Engineer</text>
  <!-- Description -->
  <text x="80" y="400" font-family="Google Sans, Inter, sans-serif" font-size="20" fill="#9CA3AF">7+ years building scalable backend systems, APIs &amp; modern web apps</text>
  <!-- Tech tags -->
  <text x="80" y="460" font-family="Google Sans, Inter, sans-serif" font-size="18" fill="#6B7280">Golang  ·  Node.js  ·  React  ·  TypeScript  ·  Kubernetes  ·  Docker</text>
  <!-- URL -->
  <text x="80" y="560" font-family="monospace" font-size="16" fill="#4B5563">hayfordstanley.vercel.app</text>
</svg>
